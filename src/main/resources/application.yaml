spring:
  application:
    name: receiptscanner

  config:
    import: optional:file:.env[.properties]

  docker:
    compose:
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:false}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:receipt_scanner_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# API Versioning
api:
  version: ${API_VERSION:v1}
  base-path: /api/${API_VERSION:v1}

# AI Provider (gemini | openai)
ai:
  provider: ${AI_PROVIDER:gemini}

# Admin User Initialization
admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin123}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong123456}
  access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
  refresh-token-expiration-minutes: ${JWT_REFRESH_TOKEN_EXPIRATION_MINUTES:10080}

# OpenAI Configuration
openai:
  api-key: ${OPENAI_API_KEY:your-api-key-here}
  model: ${OPENAI_MODEL:gpt-4o}
  api-url: ${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}

# Gemini Configuration (optional, currently unused by ReceiptService)
gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
  api-url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}

# File Storage
file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  folder: ${CLOUDINARY_FOLDER:receipts}

# Logging Configuration
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    "[com.berkan.receiptscanner]": ${LOG_LEVEL_APP:DEBUG}
    "[org.springframework.security]": DEBUG
    "[org.hibernate.SQL]": DEBUG
  
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  
  file:
    name: ${LOG_FILE_PATH:logs/application.log}
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

security:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
    exposed-headers: ${CORS_EXPOSED_HEADERS:X-RateLimit-Limit,X-RateLimit-Window-Seconds}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    max-age-seconds: ${CORS_MAX_AGE_SECONDS:3600}

  rate-limit:
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:120}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
